<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Client portal — invoices, campaigns, compliance, and reporting for leadgeneration.io clients." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Warm the connection to the API server during HTML parse so the first
         API call doesn't pay the full TCP + TLS handshake (~150-300ms saved). -->
    <link rel="preconnect" href="https://sato-backend-production.up.railway.app" crossorigin />
    <link rel="dns-prefetch" href="https://sato-backend-production.up.railway.app" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <!-- Static fallback title; the app overrides document.title from the
         resolved brand (src/config/brand.ts) so clients never see "Stato". -->
    <title>leadgeneration.io — Client portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
